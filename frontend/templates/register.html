{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm p-4 rounded-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Crear Cuenta</h2>
                <p class="text-muted">Únete al Asistente Legal IT del Ministerio</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="nombre" class="form-label small fw-semibold">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0" id="nombre" name="nombre" placeholder="Ej: Wilson Arriola" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label small fw-semibold">Correo Institucional / Personal</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0" id="email" name="email" placeholder="warriol@ejemplo.com" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label small fw-semibold">Contraseña</label>
                        <input type="password" class="form-control bg-light" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirm_password" class="form-label small fw-semibold">Confirmar</label>
                        <input type="password" class="form-control bg-light" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                        Crear Cuenta
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted">¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none">Inicia sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
