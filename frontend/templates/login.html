{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm p-4 rounded-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Bienvenido</h2>
                <p class="text-muted">Ingresa tus credenciales para continuar</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-semibold">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label small fw-semibold">Contraseña</label>
                        <a href="#" class="text-decoration-none small text-primary">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                        Ingresar
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="small text-muted">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a></p>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
