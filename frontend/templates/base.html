<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Proyecto de uso de la IAGen para el Ministerio del Interior.">
    <meta name="keywords" content="chat,llm,llama,ia,agente,docker,personalizado,leyes,uruguay,ortografía">
    <meta name="author" content="Wilson Denis Arriola">
    <title>HDA - Legal IT Assistant</title>

    <link rel="icon" href="{{ url_for('static', filename='img/wda.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        @font-face {
            font-family: 'Inter';
            /* La ruta debe ser relativa al archivo CSS o usar url_for en el HTML */
            src: url('../static/fonts/inter-v20-latin-regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body>

    {% block navbar %}{% endblock %}

    <main class="container py-4">
        <div id="alert-wrapper" class="alert-container">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show shadow-sm" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/marked-3.min.js') }}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(function() {
                let alerts = document.querySelectorAll('.alert');
                alerts.forEach(function(alert) {
                    let bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 5000);
        });

        const btnTheme = document.getElementById('btn-theme-toggle');
        const iconTheme = document.getElementById('theme-icon');

        // Función para cambiar el tema
        btnTheme.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-bs-theme', newTheme);

            // Cambiar el ícono
            iconTheme.classList.toggle('bi-moon-stars-fill');
            iconTheme.classList.toggle('bi-sun-fill');

            // Guardar preferencia en el navegador
            localStorage.setItem('theme', newTheme);
        });

        // Cargar preferencia guardada al iniciar
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
