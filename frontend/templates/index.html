{% extends "base.html" %}

{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center text-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg p-5"
            style="background-image: url('/static/img/fondo_blanco.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 4rem;"></i>
            </div>
            <h1 class="display-5 fw-bold text-dark"><b>H</b>elp <b>D</b>esk <b>A</b>ssistant</h1>
            <p class="lead text-muted mb-5">
                Asistente Inteligente especializado en Derecho Penal Uruguayo y soporte técnico del SGSP.
            </p>
            <div class="mb-4">
                <img src="/static/img/logo.png" alt="Logo Help Desk Assistant" class="img-fluid" style="max-width: 180px;">
            </div>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg px-5 gap-3 rounded-pill shadow">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </a>
                <a href="{{ url_for('auth.register') }}" class="btn btn-secondary btn-lg px-5 rounded-pill">
                    Registrarse
                </a>
            </div>
            <div class="mt-5 text-muted small">
                © 2026 Wilson Denis ARRIOLA - Uruguay
            </div>
        </div>
    </div>
</div>
{% endblock %}
